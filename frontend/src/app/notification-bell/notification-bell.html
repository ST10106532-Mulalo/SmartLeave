<div class="notification-container">
  <div class="bell-icon" (click)="toggleDropdown($event)" [class.shake]="isShaking">
    🔔
    <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
  </div>

  <div class="notification-dropdown" *ngIf="showDropdown">
    <div class="dropdown-header">
      <h3>Notifications</h3>
      <button class="mark-read-btn" (click)="markAllAsRead()" *ngIf="unreadCount > 0">
        Mark all as read
      </button>
    </div>

    <div class="notifications-list">
      <div *ngIf="notifications.length === 0" class="empty-state">
        <div class="empty-icon">🔔</div>
        <p>No notifications</p>
        <small>New notifications will appear here</small>
      </div>

      <div 
        *ngFor="let notification of notifications; let i = index" 
        class="notification-item" 
        [class.unread]="!notification.isRead"
        (click)="markAsRead(notification.notificationID || notification.id)"
      >
        <div class="notification-type" [style.background]="getNotificationColor(notification.type) + '20'">
          {{ getNotificationIcon(notification.type) }}
        </div>
        <div class="notification-content">
          <div class="notification-title">{{ notification.title }}</div>
          <div class="notification-message">{{ notification.message }}</div>
          <div class="notification-time">{{ getTimeAgo(notification.createdAt || notification.timestamp) }}</div>
        </div>
        <button class="notification-action" (click)="navigateToReference(notification); $event.stopPropagation()" *ngIf="notification.referenceType || notification.type === 'PendingApproval'">
          View →
        </button>
      </div>
    </div>

    <div class="dropdown-footer">
      <button class="clear-all-btn" (click)="clearAll(); $event.stopPropagation()" *ngIf="notifications.length > 0">
        Clear all
      </button>
      <button class="view-all-btn" (click)="navigateToAll()">
        View all notifications
      </button>
    </div>
  </div>
</div>
